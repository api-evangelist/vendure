      - Observability
    properties:
      - type: Package
        url: https://www.npmjs.com/package/@vendure/telemetry-plugin
  - aid: vendure:testing
    name: '@vendure/testing'
    description: >-
      End-to-end testing harness for Vendure servers and plugins. Bootstraps
      an isolated Vendure instance with seed data and exposes typed GraphQL
      clients against the Shop and Admin APIs.
    humanURL: https://docs.vendure.io/
    baseURL: https://www.npmjs.com/package/@vendure/testing
